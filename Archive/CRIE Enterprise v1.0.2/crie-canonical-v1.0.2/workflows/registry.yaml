# Workflow Registry (§152, §159, §213, S1-9).
# Canonical inventory of every workflow ID, its type, owning sprint, and build status.
# Workflow IDs SHALL never change after publication (§634).
# This is the authored source of truth; cached into configuration.workflow_registry
# (§228, R-08) by the seed step in Sprint 2.
#
# Sub-workflow catalog is Module 13 SW-001..SW-028 (R-01) — the §158 and §624 lists
# do NOT govern IDs. Master set is the five WF-001..WF-005 (R-02); there is no WF-006.
#
# status: "built"   = implemented in this repository now
#         "planned"  = owned by a later sprint; intentionally ABSENT until then
#                      (no placeholder implementation is created)

registryVersion: 1

standardPattern:                 # §159 / §212 — every workflow follows this lifecycle
  - Trigger
  - Initialize
  - Validate Input
  - Execute
  - Validate Output
  - Persist
  - Log
  - Return Result

master:                          # §623 — five master workflows (R-02)
  - { id: WF-001, name: Knowledge_Ingestion,   file: master/WF-001_Knowledge_Ingestion.json,  status: planned, ownedBySprint: 3 }
  - { id: WF-002, name: Enterprise_Retrieval,  file: master/WF-002_Enterprise_Retrieval.json,  status: planned, ownedBySprint: 5 }
