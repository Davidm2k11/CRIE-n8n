# CRIE — authority.yaml
# Authored source of truth for the authority-source model (R-08 / R-16 / §439).
# Canonical 9-source table; supersedes §72. Seeded into the authority reference
# table via the seed/sync step (§236). Scores SHALL remain configurable (§439).
#
# Resolution rules (§440):
#   higher authority wins → newer version wins → return both + human review.
#   Conflicts SHALL NEVER be silently discarded.
